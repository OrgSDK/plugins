name: Release

# npm release — requires explicit authentication. This workflow is
# MANUAL ONLY (workflow_dispatch). It never publishes automatically on
# pushes, tags, or any other event.
#
# Required secret: NPM_TOKEN (npm automation/publish token for @orgsdk).
# Without it, the publish step fails clearly. See README §Publishing.

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    steps:
      # actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      # oven-sh/setup-bun@v2
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: 1.3.9

      - name: Install dependencies (frozen)
        run: bun install --frozen-lockfile

      - name: Typecheck + lint + tests
        run: |
          bun run typecheck
          bun run check
          bun run test

      - name: Verify NPM_TOKEN is present
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "::error::NPM_TOKEN secret is not set. Publication requires explicit npm authentication."
            echo "See README §Publishing for setup instructions."
            exit 1
          fi

      # actions/setup-node@v4 — required for npm provenance + registry auth
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public
