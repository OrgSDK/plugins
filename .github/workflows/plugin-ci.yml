name: Plugin CI (reusable)

# Centrally maintained reusable CI workflow for OrgSDK plugin repositories.
# Consumers call it with `uses:` — see docs/reusable-workflows.md.
#
# It runs in the CALLER's repository context: actions/checkout checks out the
# caller repo at the caller ref, and the caller's GITHUB_TOKEN applies. It only
# invokes the caller's own `bun run` scripts (check, typecheck, test,
# version-guard, validate, package) — it never duplicates plugin mechanics.
#
# Prerequisite: the caller depends on @orgsdk/plugins (devDependency) and
# defines those npm scripts. Full history is fetched so the version guard can
# diff against the PR base / previous commit.

on:
  workflow_call:
    inputs:
      bun-version:
        description: "Bun version to install (oven-sh/setup-bun)."
        required: false
        type: string
        default: "1.3.9"
      artifact-name:
        description: "Name for the uploaded dist/ artifact."
        required: false
        type: string
        default: "plugin-artifact"
      upload-artifact:
        description: "Upload the packaged dist/ artifact."
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      # actions/checkout@v4 — full history so the version guard can diff
      # against the PR base / previous commit (robust to shallow clones).
      - name: Checkout caller repo (full history)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      # oven-sh/setup-bun@v2
      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: ${{ inputs.bun-version }}

      - name: Install dependencies (frozen)
        run: bun install --frozen-lockfile

      - name: Version guard (manifest version tracks publishable content)
        env:
          # pull_request: diff against the base branch tip (origin/<base>).
          # push: diff against the previous commit on this branch.
          BASE_REF: ${{ github.event_name == 'pull_request' && format('origin/{0}', github.event.pull_request.base.ref) || github.event.before }}
          BASE_BRANCH: ${{ github.event.pull_request.base.ref }}
        run: |
          # Ensure the base ref is present in the local clone (PR checkouts may
          # not fetch the base branch tip by default). Best-effort; the guard
          # no-ops gracefully if the ref still cannot be resolved. BASE_BRANCH is
          # passed via env (not inline ${{ }}) to avoid any script-injection surface.
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ] && [ -n "$BASE_BRANCH" ]; then
            git fetch --no-tags --depth=1 origin "$BASE_BRANCH" 2>/dev/null || true
          fi
          bun run version-guard

      - name: Format + lint
        run: bun run check

      - name: Typecheck
        run: bun run typecheck

      - name: Tests
        run: bun run test

      - name: Validate (manifest + source purity)
        run: bun run validate

      - name: Package artifact
        run: bun run package

      # actions/upload-artifact@v4
      - name: Upload artifact
        if: ${{ inputs.upload-artifact }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ${{ inputs.artifact-name }}
          path: dist/
          retention-days: 14
