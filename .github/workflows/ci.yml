name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      # actions/checkout@v4
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      # oven-sh/setup-bun@v2
      - uses: oven-sh/setup-bun@7ee09f6d25d5974c1c06df967dc3afeca364f283
        with:
          bun-version: 1.3.9

      - name: Install dependencies (frozen)
        run: bun install --frozen-lockfile

      - name: Format + lint
        run: bun run check

      - name: Typecheck
        run: bun run typecheck

      - name: Tests
        run: bun run test

      - name: Pack dry-run (verify public file set)
        run: bun pm pack --dry-run
