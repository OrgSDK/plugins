version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    # Do not auto-merge Zod major bumps — they need manual compat verification.
    ignore:
      - dependency-name: "zod"
        update-types: ["version-update:semver-major"]
